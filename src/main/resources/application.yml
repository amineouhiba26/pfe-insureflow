spring:
  main:
    allow-bean-definition-overriding: true

  application:
    name: insureflow

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://localhost:5433/insureflow_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: insureflow
    password: insureflow

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.1:8b
        options:
          temperature: 0.1
      embedding:
        model: mxbai-embed-large
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024
        distance-type: COSINE_DISTANCE
        index-type: HNSW

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.insureflow: DEBUG

insureflow:
  rabbitmq:
    exchange: insureflow.claims
    queues:
      intake:    claim.intake
      routed:    claim.routed
      validated: claim.validated
      estimated: claim.estimated
      fraud:     claim.fraud.checked
      decision:  claim.decision
      review:    claim.human.review

langchain4j:
  ollama:
    chat-model:
      enabled: false   # we wire ChatLanguageModel manually in LangChain4jConfig
      base-url: http://localhost:11434
      model-name: llama3.1:8b
      temperature: 0.1
      timeout: 120s
